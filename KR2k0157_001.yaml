body:
  text: 闞駰十三州志右扶風安陵縣本周之程邑也穎川郡新汲縣本汲鄉也宣帝神爵三年置以河內有汲故加新也汝南郡慎陽永平五年失印更刻遂誤以水為心魏郡斥邱縣地多斥鹵故曰斥邱常山郡元氏縣魏公子元之封邑故曰元氏勃海郡南皮縣章武有北皮亭故此云南金城郡臨羌縣西有卑和羌即獻王莽地為西海郡者也張掖郡居延縣武帝使伏波將軍路博德築遮虜障於居延城敦煌郡淵泉縣地多泉水故以為名雲中郡北輿縣廣陵有輿故此加北代郡當城縣當桓都城故曰當城東安陽縣五原有安陽古疵加東信都扶柳縣其地有扶澤澤中多柳故曰扶柳廣川縣其縣中有長河為流故曰廣川災川東安平縣博陵有安平故此加東並前漢書地理志注蜀之先肇於人皇之際黃帝為子昌意娶蜀山氏後子孫因封焉河陽縣在於河上即孟津是也秦亭秦谷是也河南緱氏縣以山為名一云轘轅為九十二曲是險道也丹朱遊故虛故曰朱虛溰水出鄠縣南太子建所居城父謂今亳州城父縣也古平州縣在汾州界休縣五十里長沙有萬里沙祠西自湘州至東萊萬里故曰長沙大郡曰守小郡曰尉並史記注窳渾縣有大道西北出雞鹿塞典屬國武帝置掌納胸奴降者也哀帝省并大鴻臚故今復置之大夫皆掌顧問應對言議夫之言扶也言能扶持君父也護烏丸擁節秩比二千石武帝置以護內附烏丸既而并於胸奴中郎將中興初班彪上言宜復此官以招附東胡乃復更置焉侍御史周官即柱下史秩六百口掌注記言行糾諸不法員十五人出有匠案則稱使者焉謁者秦官也員七十人皆選孝廉年未五十曉解儐贊者歲盡拜縣令長史及都官府丞長史博士秦官博通古今秩皆六百石孝武初置五經博士後稍增至十四員取聰明威重者一人為祭酒主領焉議郎郎官皆秦官也它無所掌秩六百石或四百石縣為侯邑則令長為相秩隨令長本秩旄牛縣屬蜀部旄牛所出荿貢其尾以為節旄將兵長史居在日南郡又有將兵司馬去雒陽九千六百三十里有秩嗇夫得假半章印成帝時河隄大壞泛濫青徐兗豫四州略遍乃以校尉王延代領河隄謁者秩千石或名其官為護都水使者中興以二府掾屬之朐音春䏰音忍其地下濕多朐䏰蟲因以名縣故城在今夔州雲安縣西萬戶故城是也句踐之地南至句章其後併吳因大城之章伯功以示子孫故曰句章傅巖在大陽縣界令其穴尚存楊氏縣在魏邵北地並後漢書注左南津西六十里白土城城在大河之北而為緣河濟渡之處石城西一百四十里有左南城津亦取名焉白石縣在狄道西北二百八十里灕水徑其北廣大阪在枹罕西北罕幵在焉枹罕縣在郡西二百一十里灕水在城南門前東過也安故縣在郡南四十七里蓋延轉擊狄道安故五溪及羌大破之即此也大夏縣西有故金柳城去縣四十里本都尉治金城西即湟水之源也西平張掖之間大月氐之別小月氐之國臨羌新縣在郡西北八十里湟水徑城南也長寧亭北有飬女嶺即浩亹之西平之北山也西平西北六十里遠矣西平亭北有土樓神祠安夷城有東西門去西平亭東四十里金城河初與浩亹河合又與勒且河合浩讀閣也故亦曰閣門水湟水河在南門刖東過六谷水自南破羌川自北左右翼注允吾縣西四十里有小晉興城黃河至金城縣謂之金城河隨地為名也石城津在金城西北大河在金城北門東流有梁泉注之出縣之南山廉城在富平北三封在臨戎縣西一百四十里原亭城中部都尉治五原西南六十里今世謂之石崖城善無縣南七十里有中陵縣舊定襄郡治武縣在善無西百五十里俗謂之大羅城水亦藉稱焉蒲城在西北漢武帝置蒲阪堯都雷首山一名獨頭山夷齊所隱山南有古冢陵柏蔚然攢茂邱阜俗謂之夷齊墓河陽別縣非溫邑也治河上河孟津河也張甲河東北至修縣入清漳鳴犢河東北至修入屯氏厭次縣本富平車騎將軍張安世之封邑明帝永平五年改曰厭次汾水出武州之燕京山亦管涔之異名也令狐即猗氏也刳首在西三十里縣南對澤即猗頓之故居也榆次塗陽縣晉水出龍山一云水結絀山在縣西北軹縣南山西曲有故向城即周向國也滎波潘澤名也濟水在縣西北鄭邑也首受別濟即北濟也壽張有蚩尤祠被孟豬不言入而言被者明不常入也水盛方乃覆被矣山陽有東緡縣泲水王武德入河頓邱在淇水南有潞水為冀州浸即漳水也經縣東五十里有繚城故縣也扶柳縣東北有武陽城故縣也昌城本名阜城楊氏縣北四十里有武亭故縣也廣平城東北一百一十里有潘縣馬城在高柳東一百四十里俗謂是水為河頭涿鹿東北至谷城六十里遼東屬國都尉治昌黎道有黃龍亭魏營州刺史治侯水南入渝大遼水自塞西南至安市入於海浿水縣在樂浪東北鏤方縣在郡東三嵞山在東南漆水出漆縣西北岐山東入涓萬年縣西有沍渭北有小河渭此水也蓮芍縣以草受名也楚水汧水出汧縣西北蕃在鄭西新鄭水西鄭友之始封洛水漢或為漾漾水出崑崙西北隅至氐道重源顯發而為漾水隴西縣嶓豚山在西西漢水所出南入廣魏白水漾水出獂道東至武都入漢強水出陰平西北強山一曰強川本汝水別流其後枯竭號曰死汝水故其字去水召者高也其地邱壚井深數丈沽以名焉山桑縣山生於邑其庭有桑因以氏縣也貫城在蒙縣西北首受災護渠亦兼弱水之稱也蒙澤在縣東西至湖陸入泗今成武縣東南有郜城俗謂之北郜山陽南平陽縣又有閭邱鄉琅琊郎祝魯之音蓋字承讀變矣縣處勢平故曰博昌周成王時薄姑與四亂國作亂周公滅之以封太公以其初出沮洳然故曰沮水也縣亦受名焉江水至會稽與浙江合浙水自臨平湖南通浦陽江又於餘暨東合浦陽江自秦望分派東餘姚縣又為江也東與車箱水合水出車箱山東高瀑布四十餘丈雖有水旱而澍無增減復陽縣胡陽之樂鄉也元帝元延二年置在桐柏大復山之陽故曰復陽晉大始中割南陽東鄙之安昌平林平氏義陽四縣置義陽郡於安昌城漢和帝永平九年分汝陰置多陂塘以溉稻故曰富陂縣亳城漢武帝分穀孰置春秋莊公十三年宋公子卿說奔於亳者也魯陽縣有湯水可以療疾湯側又有寒泉地勢不殊而炎涼異致雖隆火盛日肅若永谷矣渾流伺溪滍水東北至定隆入汝魯陽縣今其地魯山是也夏水出沛國城父東至此合為肥比影縣比讀蔭庇之庇影為已下言為身所庇也與水所出東入沅日華永出柱陽郴縣華山西至湘南縣入湘大別水南出耒陽縣大山北至酃縣入湖廬水西出長沙安復縣武木山出錢水東入海並水經注崑崙山在西海之戌地東海之玄地去岸十三萬里有弱水周回繞市山東南接積石圃西北接北戶之室束比臨大活之井西南至承淵之谷此四角大山實崑崙之支輔也北利城今在上蔡武帝時豫州有白羊出溪澗中故名羊澗代郡故城盧植說初置築時方就板幹夜自移西南五十里大澤中自設結葦為九門於是就以為城周旋七里今案在飛狐界歷城本周之甘泉西地鹿塞在蒼松縣南十里昭武蘇有臨澤亭在其東城故弦子都也效穀縣故漁澤障高昌壁故屬敦煌有長谷在東都尉居之金城郡有金城關上黨有井關敦煌龍勒有玉門關龍關並初學記昔禹治洪水既畢乃乘車到鍾山祀上帝於北河歸大功於九湖也書鈔赤水西有白玉山山有西王母堂室晉陽有羊腸蟠曲在其西北九十里黑山險為逋兆藪朱圉山有石鼓不擊自鳴則兵起戰國時梁屬魏秦置三十六郡屬三川郡漢為河南郡之梁縣巨鹿唐虞時大麓之地尚書堯試舜百揆納於大麓麓則林之大者堯之禪舜欲使天下皆見之故合群臣與百姓納之大麓之野然後授受以明已禪之功也真定本名東垣以河東有垣故此加東耳中山武公本周之同姓其後桓公不恤國政晉太史餘見周王王問之諸侯孰先亡對曰中山之俗以晝為夜以臣觀之中山其先亡乎其後樂羊為魏文侯將拔中山封之靈壽太初元年蠡吾侯入繼孝賢是為孝桓帝追尊其父蠡吾侯翼為孝崇皇帝陵曰搏陵因改為博野縣北近城河間有新城故此加北耳勃海風俗鷙戾多氣力輕姦凶浮陽水所出東入海漢末大亂胸奴侵邊自定襄已西盡雲中雁門之間遂空建安中丞相曹公集荒郡之戶以為縣聚之九原界以立新興郡領九原等縣屬并州街泉戎邑道屬天水郡漢章帝建初二年徙巨鹿王恭為江陵王三公上言江陵在京師正南不可以封乃徙為安陸王防陵即春秋防渚也定城置在古黃子國南十二里牂牁者江中山名也烏孫國嫁娶賣馬聘先令媒者與婦宿徐乃壻近僧彊中國在天竺南佛寺三千餘所今地有神珠非石玉晝迄於國中光明於日珠徑一尺五寸其色正碧青州平原國和帝延平九年以封子懷王勝風俗與舊齊同然奸吏倍於民給衛士吏賦狐肉稍從假錢積至乃餘歲竟交代吏無償意衛士恨恚取狐肉沃以酒從而呪之曰狐肉狐肉尾斯尾斯身軀雖小錢多私之吏聞之恐乃償之錢山桑縣人俗貪僞好持馬鞭行邑故語曰沛國龍穴至山桑詐託旅使若奔喪道遇寇抄遂失資糧上虞縣有雁為民田春銜拔草根秋喙除其穢是以縣官禁民不得妄害此鳥犯則有刑無赦當七國稱王獨杜宇稱帝於蜀以褒斜為前門熊耳靈關為后玉戶玉疊峨眉為池澤汶山為畜牧中南為園苑時荊地有一死者名鱉冷其尸亡至汶山郤是更生見望帝以為蜀相時巫山蜀地雍江洪水望帝仗鱉冷鑿巫山治水有功望帝自以德薄乃委國鱉冷號曰開明遂自亡去化為子規故蜀人聞名曰我望帝也望帝使鱉冷治水而淫其妻冷還帝慚遂化為子規杜宇死時適二月而子規嗚故蜀人聞之皆起自開明已下七葉始立宗廟時蜀有五丁力土能徙山嶽每一王死五丁輒為立大石以志墓今石井是也號日井里舍衛國在月氐南萬里果大如三斗杓並御覽平陵城本東陵後改為平陵漢古縣在平原郡南五十里宋置高唐縣陽樂縣在當利縣東北二十里陽縣當利縣東有陵石城陵為陽字之誤海西在開陽一百三十里有東西二鄆魯昭公所居者為西鄆在兗州東平郡是也莒與魯所爭為鄆即沂水縣是也蘭陵故魯次室邑其後楚取之改為蘭陵縣宋因之郡道里數即隴州杜陽故城近之昔共伯復歸於國逍遙得意遊共山之首澶水在頓邱西南三十里伏流至繁城西南秦一東巡回死沙邱淮南九藪趙有巨鹿今其地即廣阿澤也內邱縣在漢為中邱縣山海經謂西北有蓬山邱在其間故曰中邱北平縣本秦曲逆縣之地後漢章帝巡北嶽以曲逆名不善改為蒲陰縣冀州之地蓋古京也人患剽悍故語曰仕宦不偶值冀部其人剛狠淺於思義無賓序之禮懷固慳嗇古語云幽冀之人鈍如錐亦履山之險為逋逃之藂饒安縣東南二十里有童鄉亭即故章鄉縣童字類章章鄉蓋在東南二十里童鄉亭涿郡南有涿水北至上谷為涿鹿河其枝流入胸奴中者謂之涿邪水京師之州司隸校尉掌焉曰司州梁國有二亳在穀北亳在蒙湯會諸侯於景亳即蒙之北亳也故頓子城在穎水之南故為穎陰城熟城漢之縣名盧氏有朱陽山因別立縣杼杪光武封劉舨為杼秋侯明帝以屬沛取慮故城取如星分胔陬慮若公羊邾婁之婁朱虛東十三里有校亭縣高唐縣有爵堤以捍河水犍為郡有犍為山因置道縣以屬焉餘潛縣本作朁讀為潛出好布仁水源出廢石陽縣側枳縣在巴郡東揚州後徙於陰陵昔蜀王從卒數千出獵於褒谷秦惠王亦畋於山中怪而問之以金一筐遺蜀王及報欺之以土秦王大怒其臣曰此秦得土之端也秦王未知蜀道乃刻石牛五頭置金於尾下僞如飬之者言此天牛能屎金蜀人見而言乃令五丁共引牛成道致之成都秦知蜀道而亡蜀今接故金牛縣界孱陵城吳大帝封呂蒙為孱陵侯即此地也略陽道在郡東六十里即故冀城也會水一名白亭海衆羌之水所會故曰會水北有白亭因為之白亭水也玉門縣置長三百里石門周匝山間裁經二十里衆泉流入延興玉門關屯徙其人於此故曰玉門縣延壽縣在郡西金山在其東至玉石障是亦漢遮虜障也瓜州戎為月氐所逐并六國築長城西不過臨洮則秦未有此地漢武帝後二六年分酒泉之地置燉煌郡徙邊人以實之婼羌國濱帶南山西有蔥嶺餘種或虜或羌戶口甚多也在古不立君臣無分長幼強則分種為酋豪弱則為人附落更相抄暴以力為雄唯殺人償死無他禁令其兵長於山谷短於平地不能持久而果於觸突於戰死為利病終不祥奄蔡粟特各有長而魏收以為一國謬也小宛併於鄯善並寰宇記平陸吳山上有虞城舜始封塗山氏思本國築臺以望之基猶在夏南安邑鄲漢周應為鄲侯者武功邰城呼沱南易冏州上洛並路史金城安夷縣東有勒姐河與金城河合勒姐嶺蓋勒姐河所出之也漢時勒姐羌居之因以為名通鑑注
